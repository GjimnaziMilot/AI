<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gjimnazi Milot - Faqja Zyrtare</title>
  <link rel="stylesheet" href="gjimnazimilot.css">
</head>
<body>

<nav>
  <!-- navbar siç e ke -->
</nav>

<div class="hero-section">
  <img src="gjimnazimilotfoto.jpeg" alt="Gjimnazi Milot" class="hero-image">
</div>

<div class="container">
  <!-- përmbajtja e faqes -->
</div>

<footer>
  <p>2026 Gjimnazi Milot. Të gjitha të drejtat e rezervuara.</p>
</footer>

<!-- CHAT WIDGET -->
<div class="gemini-chat-container">
  <button class="gemini-chat-btn" id="openGeminiBtn">💬 Asistenti Milot</button>
  <div class="gemini-chat-window" id="geminiWindow">
    <div class="gemini-chat-header">
      <span>Asistenti Virtual</span>
      <button class="gemini-close-btn" id="closeGeminiBtn">&times;</button>
    </div>
    <div class="gemini-chat-messages" id="geminiMessages"></div>
    <div class="gemini-input-area">
      <input type="text" id="geminiInput" placeholder="Shkruaj një pyetje..." onkeypress="handleGeminiKey(event)">
      <button id="geminiSendBtn">Dërgo</button>
    </div>
  </div>
</div>

<script>
const openBtn = document.getElementById('openGeminiBtn');
const closeBtn = document.getElementById('closeGeminiBtn');
const chatWindow = document.getElementById('geminiWindow');
const sendBtn = document.getElementById('geminiSendBtn');
const userInput = document.getElementById('geminiInput');
const chatMessages = document.getElementById('geminiMessages');

openBtn.addEventListener('click', () => { chatWindow.style.display = 'flex'; openBtn.style.display = 'none'; });
closeBtn.addEventListener('click', () => { chatWindow.style.display = 'none'; openBtn.style.display = 'block'; });
sendBtn.addEventListener('click', komunikojMeGemini);
function handleGeminiKey(e) { if (e.key === 'Enter') komunikojMeGemini(); }

function shtoMesazh(text, lloji) {
  const div = document.createElement('div');
  div.className = `gemini-msg ${lloji}`;
  div.innerHTML = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

async function komunikojMeGemini() {
  const pyetja = userInput.value.trim();
  if (!pyetja) return;

  shtoMesazh(pyetja, 'user-msg');
  userInput.value = '';
  const mesazhiPritjes = shtoMesazh("<i>Duke menduar...</i>", 'bot-msg');

  try {
    const response = await fetch("https://gjimnazimilot-backend.onrender.com/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ pyetja })
    });

    const data = await response.json();
    let pergjigjiaAI = data.candidates[0].content.parts[0].text;
    mesazhiPritjes.innerHTML = pergjigjiaAI;
  } catch (error) {
    mesazhiPritjes.innerHTML = "Gabim gjatë komunikimit me serverin.";
  }
}
</script>

</body>
</html>
